<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Docker Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      text-align: center;
      background: #16213e;
      padding: 3rem 4rem;
      border-radius: 16px;
      border: 2px solid #0f3460;
    }
    h1 { color: #e94560; font-size: 2.5rem; }
    p  { color: #a8b2d8; font-size: 1.1rem; }
    .badge {
      display: inline-block;
      background: #e94560;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Hello from Docker!</h1>
    <p>This page is served from inside a container.</p>
    <p>Built by: <strong>YOUR NAME HERE</strong></p>
    <div class="badge">Lab 2 Complete</div>
  </div>
</body>
</html>
